[package]
name = "whois-rdap"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = [
    "brotli",
    "deflate",
    "gzip",
    "json",
    "rustls-tls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.48", features = ["rt-multi-thread", "macros"] }

[profile.release]
lto = true
strip = true
opt-level = 3
panic = "abort"
